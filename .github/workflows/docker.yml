name: Build Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'  # 3:00 AM Pacific (UTC-8)

env:
  INTERNAL_REGISTRY: harbor-core.harbor.svc.cluster.local
  PROJECT: open-terminal
  IMAGE_NAME: open-terminal

jobs:
  build:
    runs-on: open-terminal-docker-runner
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: prod
          project-slug: homelab-bz-gt
          secret-path: /
          export-type: env
          domain: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080

      - name: Log in to Harbor (internal)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.INTERNAL_REGISTRY }}
          username: ${{ env.HB_USERNAME }}
          password: ${{ env.HB_PASSWORD }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor-core.harbor.svc.cluster.local"]
              ca=["/etc/ssl/certs/ca-certificates.crt"]

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ matrix.platform == 'linux/amd64' && 'dev-amd64' || 'dev-arm64' }}
          cache-from: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max

  merge:
    runs-on: open-terminal-docker-runner
    needs: build
    permissions:
      contents: read

    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: prod
          project-slug: homelab-bz-gt
          secret-path: /
          export-type: env
          domain: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080

      - name: Log in to Harbor (internal)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.INTERNAL_REGISTRY }}
          username: ${{ env.HB_USERNAME }}
          password: ${{ env.HB_PASSWORD }}

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor-core.harbor.svc.cluster.local"]
              ca=["/etc/ssl/certs/ca-certificates.crt"]

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Create manifest list and push
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:dev-amd64 \
            ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:dev-arm64

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:dev
