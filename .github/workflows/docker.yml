name: Build Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
  workflow_dispatch:

env:
  INTERNAL_REGISTRY: harbor-core.harbor.svc.cluster.local
  PROJECT: open-terminal
  IMAGE_NAME: open-terminal

jobs:
  build:
    runs-on: open-terminal-docker-runner
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: prod
          project-slug: homelab-bz-gt
          secret-path: /
          export-type: env
          domain: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080

      - name: Log in to Harbor (internal)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.INTERNAL_REGISTRY }}
          username: ${{ env.HB_USERNAME }}
          password: ${{ env.HB_PASSWORD }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor-core.harbor.svc.cluster.local"]
              ca=["/etc/ssl/certs/ca-certificates.crt"]

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ matrix.platform == 'linux/amd64' && 'dev-amd64' || 'dev-arm64' }}
          cache-from: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max

  merge:
    runs-on: open-terminal-docker-runner
    needs: build
    permissions:
      contents: write

    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: prod
          project-slug: homelab-bz-gt
          secret-path: /
          export-type: env
          domain: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080

      - name: Log in to Harbor (internal)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.INTERNAL_REGISTRY }}
          username: ${{ env.HB_USERNAME }}
          password: ${{ env.HB_PASSWORD }}

      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."harbor-core.harbor.svc.cluster.local"]
              ca=["/etc/ssl/certs/ca-certificates.crt"]

      - name: Create and push manifest list
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
          SHA_TAG: sha-${{ github.sha }}
        run: |
          for TAG in dev "$SHA_TAG"; do
            docker manifest create \
              ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:$TAG \
              ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:dev-amd64 \
              ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:dev-arm64
            docker manifest push ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:$TAG
          done

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:dev

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          LATEST_TAG=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/releases/latest" \
            | jq -r '.tag_name // "v0.0.0"')

          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          curl -sf -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "$(jq -n \
              --arg tag "$NEW_TAG" \
              --arg name "$NEW_TAG" \
              '{tag_name: $tag, name: $name, generate_release_notes: true}')"
